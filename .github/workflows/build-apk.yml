name: Build Android APK

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Generate Gradle Wrapper (if missing)
      run: |
        if [ ! -f gradlew ]; then
          echo "Generating Gradle Wrapper..."
          gradle wrapper --gradle-version 8.7
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add gradlew gradlew.bat gradle/wrapper/
          git commit -m "chore: add gradle wrapper" || echo "No changes to commit"
          git push || echo "Failed to push wrapper automatically, proceeding..."
        fi

    - name: Create Dummy Env File
      run: |
        echo "GEMINI_API_KEY=dummy_key_for_compilation" > .env

    - name: Make Gradlew Executable
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

   

- name: Upload APK
  uses: actions/upload-artifact@v4
  with:
    name: app-debug
    path: app/build/outputs/apk/debug/app-debug.apk